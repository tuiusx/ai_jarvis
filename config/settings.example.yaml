app:
  mode: "dev"  # dev | prod

openai:
  api_key: ""  # use OPENAI_API_KEY in production
  model: "gpt-3.5-turbo"

voice:
  wake_word: "jarvis"
  language: "pt-BR"
  timeout: 8

memory:
  short_term_limit: 10
  long_term_file: "state/memory.json"
  long_term_limit: 100
  encryption_key_env: "JARVIS_MEMORY_KEY"

camera:
  default_index: 0
  detection_duration: 5

recording:
  default_duration: 10
  output_dir: "recordings"

security:
  enforce_env_secrets: false
  min_command_interval_seconds: 0.8
  audit_log_file: "state/audit.log.jsonl"

retention:
  enabled: true
  auto_cleanup_on_start: true
  max_age_days: 30
  max_recordings: 200
  max_faces: 2000

dashboard:
  enabled: true
  host: "127.0.0.1"
  port: 8787
  max_events: 200
